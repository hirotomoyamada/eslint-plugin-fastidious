name: "Bug Report"
description: "Create a bug report."
labels: ["triage"]
type: Bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for creating an issue.

        Please search open/closed issues before submitting. Someone might have reported the same issue before.

          - [Issues](https://github.com/hirotomoyamada/eslint-plugin-fastidious/issues?q=is%3Aissue+is%3Aopen+sort%3Aupdated-desc)
          - [Closed Issues](https://github.com/hirotomoyamada/eslint-plugin-fastidious/issues?q=is%3Aissue+sort%3Aupdated-desc+is%3Aclosed)

        Please include a minimal reproduction so we can understand the ESLint behavior quickly.
  - type: input
    id: version
    attributes:
      label: "eslint-plugin-fastidious version"
      description: "The version of eslint-plugin-fastidious you are using."
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: eslint-version
    attributes:
      label: "ESLint version"
      description: "The ESLint version where the issue occurs."
      placeholder: "npx eslint --version"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: "Node.js version"
      description: "The Node.js version where the issue occurs."
      placeholder: "node --version"
    validations:
      required: true
  - type: input
    id: package-manager
    attributes:
      label: "Package manager"
      description: "The package manager and version used by the project where the issue occurs."
      placeholder: "pnpm 10.33.0"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: "Description"
      description: "A brief description of the issue."
      placeholder: |
        When I ____, I expected ____ to happen, but ____ happened instead.
    validations:
      required: true
  - type: dropdown
    id: rule
    attributes:
      label: "Rule or config"
      description: "Select the rule or config where the issue occurs."
      options:
        - "fastidious/no-single-letter-variable"
        - "fastidious.configs.recommended"
        - "Other (add additional context)"
  - type: textarea
    id: eslint-config
    attributes:
      label: "ESLint configuration"
      description: |
        Include the relevant parts of your ESLint config.
      render: js
    validations:
      required: true
  - type: textarea
    id: sample-code
    attributes:
      label: "Code sample"
      description: |
        Include the smallest code sample that reproduces the issue.
      render: js
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: "Steps to Reproduce"
      description: |
        Explain how to reproduce the issue.
      value: |
        1. Configure ESLint with '...'
        2. Run 'pnpm exec eslint ...'
        3. Observe '...'
  - type: checkboxes
    id: operating-system
    attributes:
      label: "Operating System"
      description: "The operating system(s) on which this issue occurred."
      options:
        - label: "macOS"
        - label: "Windows"
        - label: "Linux"
  - type: textarea
    id: actual-output
    attributes:
      label: "Actual output"
      description: |
        Include the ESLint output, stack trace, or relevant logs.
      render: shell
  - type: textarea
    id: expected-output
    attributes:
      label: "Expected output"
      description: |
        Describe the lint result or autofix output you expected.
  - type: textarea
    id: additional-context
    attributes:
      label: "Additional context"
      description: |
        Include parser, language options, TypeScript settings, links, screenshots, or other useful context.
  - type: textarea
    id: reproduction
    attributes:
      label: "Minimal reproduction"
      description: |
        Link to a minimal reproduction repository or paste enough files to reproduce the issue.
  - type: dropdown
    id: fix
    attributes:
      label: Do you know how to fix the issue?
      options:
        - "Yes"
        - "No"
  - type: dropdown
    id: participate
    attributes:
      label: Are you willing to participate in fixing this issue and create a pull request with the fix?
      options:
        - "Yes"
        - "No"
  - type: textarea
    id: additional-information
    attributes:
      label: "Additional Information"
      description: |
        Use this section to provide any additional information you might have,
        such as a possible fix, screenshots, notes, or links to ideas.
  - type: checkboxes
    id: ai-used
    attributes:
      label: "AI used"
      options:
        - label: "I did not use AI to create this issue."
        - label: "(If there is no check above) I checked the generated content before submitting."
